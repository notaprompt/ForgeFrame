<!DOCTYPE html>
<html lang="en" data-theme="olive">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeFrame Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --canvas: #c2c4b4;
    --panel: rgba(240,238,230,0.6);
    --panel-solid: rgba(245,243,236,0.85);
    --panel-hover: rgba(245,243,236,0.7);
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.18);
    --shadow: 0 8px 32px rgba(0,0,0,0.07), 0 1px 0 rgba(255,255,255,0.6) inset;
    --ink: #1c1917;
    --t1: rgba(28,25,23,0.88);
    --t2: rgba(28,25,23,0.62);
    --t3: rgba(28,25,23,0.42);
    --t4: rgba(28,25,23,0.28);
    --t5: rgba(28,25,23,0.14);
    --t6: rgba(28,25,23,0.07);
    --gt1: rgba(28,25,23,0.75);
    --gt2: rgba(28,25,23,0.5);
    --gt3: rgba(28,25,23,0.3);
    --gold: #a07d42;
    --gold-dim: rgba(160,125,66,0.4);
    --gold-bg: rgba(160,125,66,0.1);
    --cream: #E8DCC8;
    --cream-bg: rgba(232,220,200,0.3);
    --earth: #6b5940;
    --earth-dim: rgba(107,89,64,0.35);
    --terra: #b07d50;
    --terra-dim: rgba(176,125,80,0.35);
    --sage: #5e8a52;
    --sage-dim: rgba(94,138,82,0.4);
    --sage-bg: rgba(94,138,82,0.1);
    --danger: #9e4a45;
    --danger-dim: rgba(158,74,69,0.35);
    --danger-bg: rgba(158,74,69,0.08);
    --font-ui: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    --radius: 12px;
  }

  /* === THEME: INK (dark) === */
  [data-theme="ink"] {
    --canvas: #1a1a1f;
    --panel: rgba(30,30,35,0.7);
    --panel-solid: rgba(38,38,44,0.9);
    --panel-hover: rgba(42,42,48,0.8);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.14);
    --shadow: 0 8px 32px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.04) inset;
    --ink: #e8e6e1;
    --t1: rgba(232,230,225,0.88);
    --t2: rgba(232,230,225,0.6);
    --t3: rgba(232,230,225,0.4);
    --t4: rgba(232,230,225,0.25);
    --t5: rgba(232,230,225,0.12);
    --t6: rgba(232,230,225,0.06);
    --gt1: rgba(232,230,225,0.7);
    --gt2: rgba(232,230,225,0.45);
    --gt3: rgba(232,230,225,0.25);
  }

  /* === THEME: LINEN (warm) === */
  [data-theme="linen"] {
    --canvas: #d6cfc0;
    --panel: rgba(235,228,215,0.65);
    --panel-solid: rgba(242,236,224,0.88);
    --panel-hover: rgba(245,240,228,0.75);
    --border: rgba(120,100,70,0.12);
    --border-hover: rgba(120,100,70,0.2);
    --shadow: 0 8px 32px rgba(80,60,30,0.08), 0 1px 0 rgba(255,255,255,0.5) inset;
  }

  /* === THEME: SLATE (neutral) === */
  [data-theme="slate"] {
    --canvas: #b8bcc2;
    --panel: rgba(225,228,232,0.6);
    --panel-solid: rgba(235,237,240,0.85);
    --panel-hover: rgba(238,240,243,0.7);
    --border: rgba(0,0,0,0.09);
    --border-hover: rgba(0,0,0,0.16);
    --shadow: 0 8px 32px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.55) inset;
  }

  /* === THEME: VOID (pure dark) === */
  [data-theme="void"] {
    --canvas: #0a0a0c;
    --panel: rgba(18,18,22,0.75);
    --panel-solid: rgba(22,22,28,0.92);
    --panel-hover: rgba(28,28,34,0.85);
    --border: rgba(255,255,255,0.05);
    --border-hover: rgba(255,255,255,0.1);
    --shadow: 0 8px 32px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.02) inset;
    --ink: #d4d2cd;
    --t1: rgba(212,210,205,0.88);
    --t2: rgba(212,210,205,0.58);
    --t3: rgba(212,210,205,0.38);
    --t4: rgba(212,210,205,0.22);
    --t5: rgba(212,210,205,0.1);
    --t6: rgba(212,210,205,0.05);
    --gt1: rgba(212,210,205,0.65);
    --gt2: rgba(212,210,205,0.4);
    --gt3: rgba(212,210,205,0.2);
  }

  body {
    font-family: var(--font-ui);
    font-weight: 400;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    color: var(--t1);
  }

  .grain {
    position: fixed; inset: 0;
    opacity: 0.018;
    pointer-events: none; z-index: 1000;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  }

  #thermal { position: fixed; inset: 0; z-index: 0; }
  #graph-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; cursor: grab; }
  #graph-canvas.dragging { cursor: grabbing; }
  #cy-container canvas { background: transparent !important; }

  .cockpit {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 210px 1fr 280px;
    grid-template-rows: 1fr 36px;
    height: 100vh;
    padding: 8px;
    gap: 8px;
  }

  .glass {
    background: var(--panel);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* === SIDEBAR === */
  .sidebar { padding: 20px 12px; display: flex; flex-direction: column; grid-row: 1/2; overflow-y: auto; }

  .brand {
    padding: 0 0 28px; margin: 8px 8px 12px; line-height: 1;
    position: relative; overflow: visible;
  }
  .brand-forge {
    font-weight: 900; font-size: 22px;
    letter-spacing: 6px; text-transform: uppercase;
    display: inline-block;
    position: relative;
    z-index: 2;
    color: transparent;
    background-image: repeating-linear-gradient(
      to bottom,
      #5a4a35, #5a4a35 3px,
      transparent 3px, transparent 5px
    );
    -webkit-background-clip: text;
    background-clip: text;
    background-size: 100% 100%;
    padding: 2px 0 4px;
  }
  .brand-frame {
    font-weight: 900; font-size: 22px;
    letter-spacing: 10px; text-transform: uppercase;
    color: #2a2218;
    display: block;
    transform: perspective(60px) rotateX(52deg) scaleX(1.5) scaleY(0.7);
    transform-origin: top center;
    opacity: 0.3;
    filter: blur(0.2px);
    margin-top: 2px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .nav-label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--t4); padding: 0 8px;
    margin-bottom: 6px; margin-top: 20px;
  }
  .nav-label:first-of-type { margin-top: 0; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 8px;
    font-size: 12px; font-weight: 400;
    color: var(--t2); cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--t1); }
  .nav-item.active {
    background: rgba(0,0,0,0.06); color: var(--t1);
    border-color: var(--border); font-weight: 500;
  }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--t5); transition: all 0.3s ease; flex-shrink: 0;
  }
  .nav-item.active .nav-dot {
    background: var(--sage); box-shadow: 0 0 8px var(--sage-dim);
  }
  .nav-count {
    margin-left: auto; font-family: var(--font-mono);
    font-size: 10px; font-weight: 400; color: var(--t3);
  }

  .tag-filters { margin-top: 4px; }
  .tag-dot { transition: all 0.3s ease; }

  .agent-strip { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--t5); }
  .agent-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; font-size: 11px; font-weight: 400;
    color: var(--t2); cursor: pointer; border-radius: 6px;
    transition: all 0.15s ease;
  }
  .agent-row:hover { background: rgba(0,0,0,0.03); }
  .adot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .adot.on { background: var(--sage); box-shadow: 0 0 6px var(--sage-dim); }
  .adot.watch { background: var(--terra); box-shadow: 0 0 6px var(--terra-dim); }
  .adot.off { background: var(--t5); }
  .astatus {
    margin-left: auto; font-family: var(--font-mono);
    font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--t3); font-weight: 400;
  }

  .guardian-strip {
    margin-top: 14px; padding: 10px 10px 0;
    border-top: 1px solid var(--t5);
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; font-weight: 400; color: var(--t2);
  }
  .g-eye {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--t4); position: relative; flex-shrink: 0;
  }
  .g-eye::after {
    content: ''; position: absolute;
    width: 4px; height: 4px; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: breathe 4s ease-in-out infinite;
  }
  .g-eye.calm::after { background: var(--sage); }
  .g-eye.warm::after { background: var(--gold); }
  .g-eye.trapped::after { background: var(--danger); }
  .g-eye.offline { border-color: var(--t5); }
  .g-eye.offline::after { background: var(--t4); animation: none; }
  @keyframes breathe {
    0%,100% { opacity: 0.3; transform: translate(-50%,-50%) scale(0.7); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
  }

  .settings-btn {
    margin-top: 12px; padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 400; color: var(--t3);
    cursor: pointer; border-radius: 6px;
    transition: all 0.15s ease;
  }
  .settings-btn:hover { background: rgba(0,0,0,0.04); color: var(--t1); }

  /* === MAIN === */
  .main-area {
    position: relative; overflow: hidden;
    background: transparent; border-radius: var(--radius);
    grid-row: 1/2;
  }

  .search-pill {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 340px; height: 34px;
    background: var(--panel-solid);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border: 1px solid var(--border); border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; padding: 0 14px; gap: 8px;
    z-index: 10; transition: all 0.2s ease;
  }
  .search-pill:focus-within {
    border-color: var(--gold-dim);
    box-shadow: var(--shadow), 0 0 0 3px var(--gold-bg);
    width: 420px;
  }
  .search-pill input {
    background: none; border: none; outline: none;
    color: var(--t1); font-family: var(--font-ui);
    font-weight: 300; font-size: 12px; width: 100%;
  }
  .search-pill input::placeholder { color: var(--t4); }
  .skey {
    font-family: var(--font-mono); font-size: 10px; color: var(--t3);
    border: 1px solid var(--t5); padding: 2px 7px;
    border-radius: 4px; white-space: nowrap; font-weight: 400;
  }

  /* Context menu */
  .ctx-menu {
    position: fixed; z-index: 100;
    background: var(--panel-solid);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.6) inset;
    padding: 4px; min-width: 160px;
    display: none; opacity: 0;
    transform: scale(0.95) translateY(-4px); transform-origin: top left;
    transition: opacity 0.12s ease, transform 0.12s ease;
  }
  .ctx-menu.visible { display: block; opacity: 1; transform: scale(1) translateY(0); }
  .ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 400; color: var(--t2);
    cursor: pointer; transition: all 0.1s ease; user-select: none;
  }
  .ctx-item:hover { background: var(--gold-bg); color: var(--t1); }
  .ctx-key {
    margin-left: auto; font-family: var(--font-mono);
    font-size: 10px; color: var(--t4);
  }
  .ctx-sep { height: 1px; background: var(--t6); margin: 3px 8px; }

  .zoom-bar {
    position: absolute; bottom: 14px; left: 14px;
    display: flex; gap: 4px; z-index: 10;
  }
  .zbtn {
    width: 30px; height: 30px;
    background: var(--panel-solid);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 300; color: var(--t2);
    cursor: pointer; transition: all 0.15s ease; user-select: none;
  }
  .zbtn:hover { border-color: var(--border-hover); color: var(--t1); }
  .zbtn:active { transform: scale(0.92); }

  .view-toggle {
    position: absolute; bottom: 14px; right: 14px;
    display: flex; gap: 2px;
    background: var(--panel-solid);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 3px; box-shadow: var(--shadow); z-index: 10;
  }
  .vbtn {
    padding: 5px 12px; font-size: 10px; font-weight: 500;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--t3); border-radius: 6px;
    cursor: pointer; transition: all 0.15s ease; user-select: none;
  }
  .vbtn.active { background: rgba(0,0,0,0.06); color: var(--t1); }
  .vbtn:hover:not(.active) { color: var(--t2); }

  /* === INSPECTOR === */
  .inspector { padding: 0; display: flex; flex-direction: column; overflow: hidden; grid-row: 1/2; }

  .inspector-header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--t5);
    display: flex; align-items: center; justify-content: space-between;
  }
  .inspector-title {
    font-size: 9px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--t3);
  }
  .inspector-close {
    font-size: 14px; color: var(--t3); cursor: pointer;
    width: 22px; height: 22px; display: flex;
    align-items: center; justify-content: center;
    border-radius: 6px; transition: all 0.15s ease;
  }
  .inspector-close:hover { background: rgba(0,0,0,0.05); color: var(--t1); }

  .inspector-tabs { display: flex; border-bottom: 1px solid var(--t5); padding: 0 4px; }
  .tab {
    flex: 1; padding: 10px 0; text-align: center;
    font-size: 10px; font-weight: 500; letter-spacing: 1px;
    text-transform: uppercase; color: var(--t3);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s ease; user-select: none;
  }
  .tab:hover { color: var(--t2); }
  .tab.active { color: var(--t1); border-bottom-color: var(--gold); }

  .inspector-scroll { flex: 1; overflow-y: auto; padding: 6px 16px; }
  .inspector-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--t4);
    font-size: 12px; gap: 8px; text-align: center; padding: 20px;
  }
  .inspector-empty-icon { font-size: 28px; opacity: 0.3; }

  .mem-detail { padding: 16px 0; }
  .memo-title {
    font-family: var(--font-ui); font-size: 15px; font-weight: 600;
    color: var(--t1); line-height: 1.4; margin-bottom: 8px;
  }
  .memo-insight {
    font-family: var(--font-ui); font-size: 12px; font-weight: 400;
    color: var(--t2); line-height: 1.5; margin-bottom: 10px;
    padding-left: 8px; border-left: 2px solid var(--gold-dim);
    font-style: italic;
  }
  .memo-patterns { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .mtag.pattern {
    background: var(--gold-bg); color: var(--gold); border-color: var(--gold-dim);
  }
  .mem-detail-content {
    font-family: var(--font-mono); font-size: 11px;
    font-weight: 400; line-height: 1.7; color: var(--t3);
    margin-bottom: 12px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .mem-detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .mem-detail-strength { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .mem-detail-strength-label {
    font-size: 10px; color: var(--t3); font-family: var(--font-mono);
  }
  .sbar { width: 80px; height: 3px; background: var(--t5); border-radius: 2px; overflow: hidden; }
  .sfill { height: 100%; border-radius: 2px; background: var(--earth); transition: width 0.6s ease; }
  .mem-detail-meta {
    font-size: 10px; color: var(--t3); font-family: var(--font-mono);
    display: flex; flex-direction: column; gap: 4px;
  }

  .mem {
    padding: 14px 0; border-bottom: 1px solid var(--t6);
    cursor: pointer; transition: all 0.15s ease;
  }
  .mem:hover {
    background: var(--cream-bg); margin: 0 -16px;
    padding: 14px 16px; border-radius: 8px;
  }
  .mem-text {
    font-family: var(--font-mono); font-size: 12px;
    font-weight: 400; line-height: 1.7; color: var(--t1);
  }
  .mem-meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; font-family: var(--font-mono);
    font-size: 10px; color: var(--t3);
  }
  .mtag {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--t5); color: var(--t2); font-weight: 500;
  }
  .mtag.principle { border-color: var(--sage-dim); color: var(--sage); background: var(--sage-bg); }
  .mtag.artifact { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-bg); }

  .edge-item {
    padding: 10px 0; border-bottom: 1px solid var(--t6);
    font-size: 11px; color: var(--t2); cursor: pointer;
  }
  .edge-item:hover { color: var(--t1); }
  .edge-type {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--t3); margin-bottom: 4px;
  }
  .edge-target { color: var(--t1); font-weight: 500; }

  .artifacts-zone { border-top: 1px solid var(--t5); padding: 14px 16px; }
  .zlabel {
    font-size: 9px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--t3); margin-bottom: 10px;
  }
  .arow {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0; font-size: 11px; font-weight: 400;
    color: var(--t2); cursor: pointer; transition: all 0.15s ease;
  }
  .arow:hover { color: var(--t1); }
  .adot2 { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .adot2.shipped { background: var(--sage); box-shadow: 0 0 6px var(--sage-dim); }
  .adot2.drafting { background: var(--terra); box-shadow: 0 0 6px var(--terra-dim); }

  /* === STATUSBAR === */
  .statusbar {
    grid-column: 1/-1;
    background: var(--panel);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex; align-items: center;
    padding: 0 16px; gap: 20px;
    font-size: 10px; font-weight: 400; color: var(--t3);
  }
  .si { display: flex; align-items: center; gap: 5px; }
  .sv { color: var(--t1); font-weight: 500; font-family: var(--font-mono); }
  .sg { margin-left: auto; display: flex; align-items: center; gap: 6px; }

  /* === AUTH GATE === */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-overlay.hidden { display: none; }
  .auth-card {
    background: var(--panel-solid);

  /* === SETTINGS PANEL === */

  /* === DISCONNECTED BANNER === */
  .disconnected-banner {
    position: fixed; top: 0; left: 0; right: 0;

  /* === SCROLLBAR === */

  ::-webkit-scrollbar-thumb { background: var(--t5); border-radius: 2px; }

  @keyframes flash-gold { 0% { background: var(--gold-bg); } 100% { background: transparent; } }

  /* === LIST VIEW === */
  .list-view {
    position: absolute; inset: 0; z-index: 5;

  }
  .list-view.active { display: block; }
  .list-item {
    display: flex; align-items: flex-start; gap: 12px;

    flex-direction: column;
    overflow: hidden;
    z-index: 500;

    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;

  }

    transform: translateY(0);

  }
  .signal-label {

  }

  }

    font-size: 11px; font-family: var(--font-mono); font-weight: 300;
    color: var(--t4); margin-top: 16px;
  }
  .signal-overlay-body {
    padding: 0 40px; overflow-y: auto; flex: 1;
    mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);

  .signal-section {
    padding: 28px 0; border-top: 1px solid var(--t6);

  .signal-section-label {

  }
  .signal-change-list { list-style: none; padding: 0; }

    padding-left: 16px; position: relative;
  }
  .signal-change-list li::before {
    content: ''; position: absolute; left: 0; top: 10px;

  .seed-card {
    background: rgba(0,0,0,0.03); border: 1px solid var(--t6);

  .seed-memory-tag {
    font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;

  }
  .seed-memory-content { font-size: 13px; font-weight: 300; color: var(--t2); line-height: 1.6; }
  .seed-bridge {
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 32px;
  }
  .seed-bridge-line {
    width: 1px; height: 100%; position: relative;
    background: linear-gradient(to bottom, transparent 0%, var(--gold-dim) 30%, var(--gold-dim) 70%, transparent 100%);
  }
  .seed-bridge-dot {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);

    padding: 8px 0; margin-top: 12px; outline: none;

  }
  .seed-thread-input.visible { max-height: 40px; opacity: 1; }
  .grade-btns { display: flex; gap: 8px; margin-top: 16px; }
  .grade-btn {
    padding: 8px 20px; border-radius: 20px; border: 1px solid var(--t5);
    background: transparent; color: var(--t3); font-size: 12px; font-weight: 400;

  }
  .grade-btn:hover { background: var(--t6); color: var(--t1); border-color: var(--border-hover); }

  .grade-btn.miss:hover { border-color: var(--danger-dim); color: var(--danger); }
  .grade-btn.confirm { border-color: var(--danger-dim); color: var(--danger); }
  .tension-card {
    background: rgba(176,125,80,0.04); border: 1px solid rgba(176,125,80,0.1);
    border-radius: 16px; padding: 24px; position: relative;
  }
  .tension-pair { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; }
  .tension-memory { font-size: 13px; font-weight: 300; color: var(--t2); flex: 1; }
  .tension-vs {
    font-size: 10px; font-weight: 500; letter-spacing: 2px; color: rgba(176,125,80,0.35);
    font-family: var(--font-mono); flex-shrink: 0;
  }
  .tension-note { font-size: 12px; font-weight: 300; color: var(--t3); line-height: 1.6; font-style: italic; }

  }
  .tension-action-btn {
    width: 24px; height: 24px; border-radius: 12px; border: 1px solid var(--t6);

  .health-value { font-size: 18px; font-weight: 200; color: var(--t2); font-family: var(--font-mono); }
  .health-label {
    font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--t4); font-family: var(--font-mono);
  }
  .calibration-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .calibration-source { font-size: 12px; font-family: var(--font-mono); font-weight: 400; color: var(--t3); min-width: 120px; }
  .calibration-bar-track { flex: 1; height: 3px; background: var(--t6); border-radius: 2px; max-width: 200px; }

  .inspector-dream-health { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }

<body>

<canvas id="thermal"></canvas>
<div class="grain"></div>

<div class="disconnected-banner hidden" id="disconnected-banner">
  <span id="disconnected-banner-text">Connection lost. Reconnecting...</span>
</div>

<div class="cockpit">
  <aside class="glass sidebar" id="sidebar"></aside>

  <main class="main-area" id="main-area">
    <canvas id="graph-canvas" style="display:none"></canvas>
    <div id="cy-container" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;background:transparent;"></div>
    <div class="list-view" id="list-view"></div>
    <div class="feed-view" id="feed-view"></div>
    <div class="search-pill" id="search-pill"></div>
    <div class="ctx-menu" id="ctx-menu"></div>
    <div class="zoom-bar" id="zoom-bar"></div>
    <div class="view-toggle" id="view-toggle"></div>
  </main>

  <aside class="glass inspector" id="inspector"></aside>

  <footer class="statusbar" id="statusbar"></footer>

  <div class="signal-dimmer" id="signal-dimmer"></div>
  <div class="signal-overlay" id="signal-overlay"></div>
</div>

<div class="auth-overlay hidden" id="auth-overlay"></div>
<div class="settings-overlay hidden" id="settings-overlay"></div>

<script>
(function() {
  'use strict';

  // ===== CONFIG =====
  var API_BASE = 'http://localhost:3001';
  var TOKEN_KEY = 'ff-token';

  // ===== SAFE DOM HELPERS =====
  // Clear all children without innerHTML
  function clearEl(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) {
      var keys = Object.keys(attrs);
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        var val = attrs[key];
        if (key === 'className') e.className = val;
        else if (key === 'textContent') e.textContent = val;
        else if (key.startsWith('on')) e.addEventListener(key.slice(2).toLowerCase(), val);
        else if (key === 'style' && typeof val === 'object') Object.assign(e.style, val);
        else e.setAttribute(key, val);
      }
    }
    if (children) {
      if (!Array.isArray(children)) children = [children];
      for (var i = 0; i < children.length; i++) {
        var c = children[i];
        if (typeof c === 'string') e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
      }
    }
    return e;
  }

  function txt(str) { return document.createTextNode(str); }

  // ===== STATE =====
  var state = {
    token: localStorage.getItem(TOKEN_KEY) || '',
    nodes: [],
    edges: [],
    nodeMap: new Map(),
    selectedId: null,
    selectedMemory: null,
    selectedEdges: [],
    artifacts: [],
    guardianTemp: 0.15,
    guardianState: 'calm',
    guardianSignals: [],
    memoryCount: 0,
    sessionCount: 0,
    edgeCount: 0,
    avgStrength: 0,
    connected: false,
    searchQuery: '',
    searchMatches: new Set(),
    theme: localStorage.getItem('ff-theme') || 'olive',
    camX: 0, camY: 0, zoom: 1,
    simRunning: true,
    dragNode: null, dragOffX: 0, dragOffY: 0,
    isPanning: false, panStartX: 0, panStartY: 0, panCamStartX: 0, panCamStartY: 0,
    ctxNodeId: null,
    inspectorTab: 'memory',
    activeView: 'graph',
    sidebarView: 'graph',
    eventSource: null,
    reconnectTimer: null,
    sessionStartTime: Date.now(),
    // Signal state
    signalOverlayOpen: false,
    sleepPressure: 0,
    sleepPressureComponents: null,
    latestJournal: null,
    pendingSeeds: [],
    pendingHindsight: [],
    tensions: [],
    silence: [],
    drift: [],
    pinnedTensions: JSON.parse(localStorage.getItem('ff-pinned-tensions') || '[]'),
    sonarPhase: 0,
  };

  // ===== API =====
  function authHeaders() {
    return { 'Authorization': 'Bearer ' + state.token, 'Content-Type': 'application/json' };
  }

  function api(path, opts) {
    var config = Object.assign({ headers: authHeaders() }, opts || {});
    return fetch(API_BASE + path, config).then(function(res) {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    });
  }

  function debounce(fn, ms) {
    var t; return function() {
      var args = arguments; var self = this;
      clearTimeout(t); t = setTimeout(function() { fn.apply(self, args); }, ms);
    };
  }

  function nodeColorRaw(memory) {
    if (memory.memoryType === 'principle') return [160, 125, 66];
    if (memory.memoryType === 'artifact') return [94, 138, 82];
    if (memory.readiness !== undefined && memory.readiness < 0.5) return [176, 125, 80];
    return [107, 89, 64];
  }

  function nodeRadius(memory) {
    return 6 + (memory.strength || 0.5) * 10;
  }

  function truncate(str, len) {
    if (!str) return '';
    return str.length > len ? str.slice(0, len) + '...' : str;
  }

  function firstMeaningfulLine(str) {
    if (!str) return '';
    // If cataloged, extract title
    if (str.trimStart().startsWith('[Title]:')) {
      return str.trimStart().slice(8).split('\n')[0].trim();
    }
    var lines = str.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.length > 0) return line;
    }
    return '';
  }

  function extractMemorandum(str) {
    if (!str || !str.trimStart().startsWith('[Title]:')) return null;
    var parts = str.split('\n---\n');
    var header = parts[0] || '';
    var memo = { title: '', insight: '', patterns: [], rawContent: parts.slice(1).join('\n---\n').trim() };
    var lines = header.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.startsWith('[Title]:')) memo.title = line.slice(8).trim();
      else if (line.startsWith('[Insight]:')) memo.insight = line.slice(10).trim();
      else if (line.startsWith('[Patterns]:')) memo.patterns = line.slice(11).split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    }
    return memo;
  }

  function contentPreview(str, lines) {
    if (!str) return '';
    var parts = str.split('\n');
    var result = [];
    for (var i = 0; i < parts.length && result.length < (lines || 3); i++) {
      var line = parts[i].trim();
      if (line.length > 0) result.push(line);
    }
    return result.join('\n');
  }

  // ===== THERMAL SHADER =====
  var glCtx = null;
  var uTime, uRes, uTemp;

  function initThermal() {
    var c = document.getElementById('thermal');
    var gl = c.getContext('webgl2');
    if (!gl) return;
    glCtx = gl;

    function resize() { c.width = innerWidth; c.height = innerHeight; gl.viewport(0, 0, c.width, c.height); }
    resize();
    window.addEventListener('resize', resize);

    var vs = '#version 300 es\nin vec2 a;\nvoid main(){gl_Position=vec4(a,0,1);}';

    var fs = [
      '#version 300 es',
      'precision highp float;',
      'uniform float t,temp; uniform vec2 r; out vec4 o;',
      'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
      'float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
      'float fb(vec2 p){float v=0.,a=.5;mat2 m=mat2(.8,.6,-.6,.8);for(int i=0;i<5;i++){v+=a*n(p);p=m*p*2.;a*=.5;}return v;}',
      'void main(){',
      '  vec2 uv=gl_FragCoord.xy/r; float s=t*.015;',
      '  float n1=fb(uv*2.5+s),n2=fb(uv*3.5-s*.8+100.); float p=n1*n2;',
      '  vec3 calm=vec3(.75,.76,.69);',
      '  vec3 mid=vec3(.82,.78,.68);',
      '  vec3 hot=vec3(.85,.74,.65);',
      '  vec3 base=mix(calm,mid,smoothstep(0.,.5,temp));',
      '  base=mix(base,hot,smoothstep(.5,1.,temp));',
      '  float i=.05+temp*.07;',
      '  vec3 vr=mix(vec3(-.01,-.005,.02),vec3(.03,-.01,-.025),temp);',
      '  vec3 col=base+p*i+vr*p;',
      '  float vig=1.-length((uv-.5)*1.2)*.1;',
      '  col*=vig; col+=.002*sin(s*3.+uv.x*10.);',
      '  o=vec4(col,1);',
      '}'
    ].join('\n');

    function comp(type, src) {
      var sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      return sh;
    }

    var pr = gl.createProgram();
    gl.attachShader(pr, comp(gl.VERTEX_SHADER, vs));
    gl.attachShader(pr, comp(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(pr);
    gl.useProgram(pr);

    var b = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, b);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
    var aLoc = gl.getAttribLocation(pr, 'a');
    gl.enableVertexAttribArray(aLoc);
    gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

    uTime = gl.getUniformLocation(pr, 't');
    uRes = gl.getUniformLocation(pr, 'r');
    uTemp = gl.getUniformLocation(pr, 'temp');
  }

  function drawThermal(time) {
    if (!glCtx) return;
    var c = document.getElementById('thermal');
    glCtx.uniform1f(uTime, time * 0.001);
    glCtx.uniform2f(uRes, c.width, c.height);
    glCtx.uniform1f(uTemp, state.guardianTemp);
    glCtx.drawArrays(glCtx.TRIANGLE_STRIP, 0, 4);
  }

  // ===== FORCE-DIRECTED GRAPH =====
  var graphCanvas = document.getElementById('graph-canvas');
  var gCtx = graphCanvas.getContext('2d');

  function resizeGraph() {
    var rect = document.getElementById('main-area').getBoundingClientRect();
    graphCanvas.width = rect.width * devicePixelRatio;
    graphCanvas.height = rect.height * devicePixelRatio;
    graphCanvas.style.width = rect.width + 'px';
    graphCanvas.style.height = rect.height + 'px';
    gCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }

  function initNodePositions() {
    var w = graphCanvas.width / devicePixelRatio;
    var h = graphCanvas.height / devicePixelRatio;
    for (var i = 0; i < state.nodes.length; i++) {
      var node = state.nodes[i];
      if (node.x === undefined) {
        node.x = (Math.random() - 0.5) * w * 0.6;
        node.y = (Math.random() - 0.5) * h * 0.6;
        node.vx = 0;
        node.vy = 0;
        // Assign a depth layer (0.6 to 1.4) for parallax
        node.depth = 0.6 + Math.random() * 0.8;
        // Drift direction per node
        node.driftAngle = Math.random() * Math.PI * 2;
        node.driftSpeed = 0.02 + Math.random() * 0.04;
      }
    }
  }

  function simulateForces() {
    if (!state.simRunning) return;
    var nodes = state.nodes;
    var edges = state.edges;
    var nodeCount = nodes.length || 1;
    var edgeCount = edges.length || 1;

    // Scale forces to graph density — dense graphs need weaker attraction
    var repulsion = 3000;
    var attraction = Math.min(0.003, 0.5 / edgeCount); // weaker with more edges
    var idealDist = Math.max(80, Math.sqrt(800 * 600 / nodeCount) * 1.2);
    var centerGravity = 0.003;
    var damping = 0.78;
    var maxVelocity = 8;

    // Cooling: simulation slows over time, stops when settled
    if (!state.simTick) state.simTick = 0;
    state.simTick++;
    var alpha = Math.max(0.02, 1.0 - state.simTick * 0.002); // cools to 0.02 over ~500 frames
    if (alpha <= 0.02) {
      // Settled — only run every 4th frame for micro-drift
      if (state.simTick % 4 !== 0) return;
    }

    // Repulsion (all pairs) — scaled by alpha
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var a = nodes[i], b = nodes[j];
        var dx = b.x - a.x;
        var dy = b.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        if (dist > 600) continue; // skip distant pairs for perf
        var force = (repulsion * alpha) / (dist * dist);
        var fx = (dx / dist) * force;
        var fy = (dy / dist) * force;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }

    // Attraction (edges) — gentle spring toward ideal distance
    for (var e = 0; e < edges.length; e++) {
      var edge = edges[e];
      var ea = state.nodeMap.get(edge.sourceId);
      var eb = state.nodeMap.get(edge.targetId);
      if (!ea || !eb) continue;
      var edx = eb.x - ea.x;
      var edy = eb.y - ea.y;
      var edist = Math.sqrt(edx * edx + edy * edy) || 1;
      var eforce = (edist - idealDist) * attraction * alpha;
      var efx = (edx / edist) * eforce;
      var efy = (edy / edist) * eforce;
      ea.vx += efx; ea.vy += efy;
      eb.vx -= efx; eb.vy -= efy;
    }

    // Apply: center gravity, damping, velocity cap
    for (var n = 0; n < nodes.length; n++) {
      var nd = nodes[n];
      if (state.dragNode === nd) continue;
      nd.vx -= nd.x * centerGravity * alpha;
      nd.vy -= nd.y * centerGravity * alpha;
      nd.vx *= damping;
      nd.vy *= damping;
      // Cap velocity
      var spd = Math.sqrt(nd.vx * nd.vx + nd.vy * nd.vy);
      if (spd > maxVelocity) { nd.vx *= maxVelocity / spd; nd.vy *= maxVelocity / spd; }
      nd.x += nd.vx;
      nd.y += nd.vy;
    }
  }

  function drawGraph() {
    if (state.activeView !== 'graph') return;
    var w = graphCanvas.width / devicePixelRatio;
    var h = graphCanvas.height / devicePixelRatio;
    gCtx.clearRect(0, 0, w, h);
    gCtx.save();

    var cx = w / 2 + state.camX;
    var cy = h / 2 + state.camY;
    gCtx.translate(cx, cy);
    gCtx.scale(state.zoom, state.zoom);

    var searching = state.searchQuery.length > 0;

    // Edges
    for (var e = 0; e < state.edges.length; e++) {
      var edge = state.edges[e];
      var ea = state.nodeMap.get(edge.sourceId);
      var eb = state.nodeMap.get(edge.targetId);
      if (!ea || !eb) continue;
      var edimmed = searching && (!state.searchMatches.has(edge.sourceId) && !state.searchMatches.has(edge.targetId));
      // Parallax: offset edge endpoints by depth
      var eaDepth = ea.depth || 1;
      var ebDepth = eb.depth || 1;
      var eax = ea.x * eaDepth;
      var eay = ea.y * eaDepth;
      var ebx = eb.x * ebDepth;
      var eby = eb.y * ebDepth;
      gCtx.beginPath();
      gCtx.moveTo(eax, eay);
      gCtx.lineTo(ebx, eby);
      gCtx.strokeStyle = edimmed ? 'rgba(107,89,64,0.02)' : 'rgba(107,89,64,0.1)';
      gCtx.lineWidth = (edge.weight || 0.5) * 1.5;
      gCtx.stroke();
    }

    // Sort nodes by depth for painter's algorithm (far first)
    var sortedNodes = state.nodes.slice().sort(function(a, b) { return (a.depth || 1) - (b.depth || 1); });

    // Nodes
    for (var i = 0; i < sortedNodes.length; i++) {
      var node = sortedNodes[i];
      var depth = node.depth || 1;
      var depthScale = 0.7 + (depth - 0.6) * 0.5; // 0.7 to 1.2 scale
      var r = nodeRadius(node) * depthScale;
      var col = nodeColorRaw(node);
      var dimmed = searching && !state.searchMatches.has(node.id);
      var selected = node.id === state.selectedId;
      var alpha = dimmed ? 0.05 : (0.2 + (node.strength || 0.5) * 0.5) * (0.6 + depth * 0.4);
      var glowAlpha = dimmed ? 0 : (selected ? 0.4 : (node.strength || 0.5) * 0.15);

      // Parallax position
      var nx = node.x * depth;
      var ny = node.y * depth;

      if (glowAlpha > 0) {
        gCtx.beginPath();
        gCtx.arc(nx, ny, r + 6, 0, Math.PI * 2);
        gCtx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + glowAlpha + ')';
        gCtx.fill();
      }

      if (selected) {
        gCtx.beginPath();
        gCtx.arc(nx, ny, r + 3, 0, Math.PI * 2);
        gCtx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0.5)';
        gCtx.lineWidth = 1.5;
        gCtx.stroke();
      }

      gCtx.beginPath();
      gCtx.arc(nx, ny, r, 0, Math.PI * 2);
      gCtx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + alpha + ')';
      gCtx.fill();

      if (r > 5 && !dimmed) {
        var label = truncate(firstMeaningfulLine(node.content), 24);
        var fontSize = Math.max(8, Math.round(10 * depthScale));
        gCtx.font = (selected ? '500' : '400') + ' ' + fontSize + 'px Inter, sans-serif';
        gCtx.fillStyle = selected ? 'rgba(28,25,23,0.75)' : 'rgba(28,25,23,' + (0.3 + depth * 0.2) + ')';
        gCtx.fillText(label, nx + r + 6, ny + 3);
      }
    }

    gCtx.restore();
  }

  // ===== MOUSE INTERACTIONS =====
  function screenToWorld(sx, sy) {
    var rect = graphCanvas.getBoundingClientRect();
    var w = rect.width;
    var h = rect.height;
    var cx = w / 2 + state.camX;
    var cy = h / 2 + state.camY;
    return {
      x: (sx - rect.left - cx) / state.zoom,
      y: (sy - rect.top - cy) / state.zoom,
    };
  }

  function hitTest(wx, wy) {
    for (var i = state.nodes.length - 1; i >= 0; i--) {
      var node = state.nodes[i];
      var depth = node.depth || 1;
      var depthScale = 0.7 + (depth - 0.6) * 0.5;
      var r = nodeRadius(node) * depthScale + 10;
      var nx = node.x * depth;
      var ny = node.y * depth;
      var dx = wx - nx;
      var dy = wy - ny;
      if (dx * dx + dy * dy < r * r) return node;
    }
    return null;
  }

  var dragMoved = false;

  graphCanvas.addEventListener('mousedown', function(e) {
    if (e.button === 2) return;
    dragMoved = false;
    var world = screenToWorld(e.clientX, e.clientY);
    var hit = hitTest(world.x, world.y);

    if (hit) {
      state.dragNode = hit;
      state.dragOffX = world.x - hit.x;
      state.dragOffY = world.y - hit.y;
      graphCanvas.classList.add('dragging');
    } else {
      state.isPanning = true;
      state.panStartX = e.clientX;
      state.panStartY = e.clientY;
      state.panCamStartX = state.camX;
      state.panCamStartY = state.camY;
      graphCanvas.classList.add('dragging');
    }
  });

  graphCanvas.addEventListener('mousemove', function(e) {
    if (!state.dragNode && !state.isPanning) {
      var world = screenToWorld(e.clientX, e.clientY);
      var hit = hitTest(world.x, world.y);
      graphCanvas.style.cursor = hit ? 'pointer' : 'grab';
    }
  });

  window.addEventListener('mousemove', function(e) {
    if (state.dragNode) {
      dragMoved = true;
      var world = screenToWorld(e.clientX, e.clientY);
      state.dragNode.x = world.x - state.dragOffX;
      state.dragNode.y = world.y - state.dragOffY;
      state.dragNode.vx = 0;
      state.dragNode.vy = 0;
    } else if (state.isPanning) {
      dragMoved = true;
      state.camX = state.panCamStartX + (e.clientX - state.panStartX);
      state.camY = state.panCamStartY + (e.clientY - state.panStartY);
    }
  });

  window.addEventListener('mouseup', function() {
    if (state.dragNode) state.simTick = Math.max(0, state.simTick - 100); // mild reheat on drop
    state.dragNode = null;
    state.isPanning = false;
    graphCanvas.classList.remove('dragging');
  });

  graphCanvas.addEventListener('click', function(e) {
    if (dragMoved) return;
    var world = screenToWorld(e.clientX, e.clientY);
    var hit = hitTest(world.x, world.y);
    if (hit) {
      selectNode(hit.id);
    } else {
      selectNode(null);
    }
    hideCtxMenu();
  });

  graphCanvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.92 : 1.08;
    state.zoom = Math.max(0.1, Math.min(5, state.zoom * delta));
  }, { passive: false });

  graphCanvas.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    var world = screenToWorld(e.clientX, e.clientY);
    var hit = hitTest(world.x, world.y);
    if (hit) {
      state.ctxNodeId = hit.id;
      selectNode(hit.id);
      showCtxMenu(e.clientX, e.clientY);
    }
  });

  // ===== CONTEXT MENU =====
  function buildCtxMenu() {
    var menu = document.getElementById('ctx-menu');
    clearEl(menu);

    var items = [
      { label: 'Open', key: '\u2318O', action: 'open' },
      { label: 'Edit', key: '\u2318E', action: 'edit' },
      { label: 'Link', key: '\u2318L', action: 'link' },
      null,
      { label: 'Promote', key: '\u2318P', action: 'promote' },
      { label: 'Tag', key: '', action: 'tag' },
    ];

    for (var i = 0; i < items.length; i++) {

  function handleCtxAction(action, nodeId) {

      api('/api/memories/' + nodeId + '/promote', { method: 'POST' }).catch(function() {});

  }

  // ===== NODE SELECTION + INSPECTOR =====
  function selectNode(id) {
    state.selectedId = id;
    if (!id) {
      state.selectedMemory = null;
      state.selectedEdges = [];
      renderInspector();
      return;
    }
    var node = state.nodeMap.get(id);
    state.selectedMemory = node || null;
    renderInspector();
    api('/api/memories/' + id + '/edges')
      .then(function(edgeData) {
        state.selectedEdges = Array.isArray(edgeData) ? edgeData : (edgeData.edges || []);
        renderInspector();
      })
      .catch(function() { state.selectedEdges = []; });
  }

  function renderInspector() {
    var panel = document.getElementById('inspector');
    clearEl(panel);

    // Dream surface mode — no tabs, no "Inspector" title
    if (!state.selectedMemory) {
      var dreamHdr = el('div', { className: 'inspector-header' });
      dreamHdr.appendChild(el('span', { className: 'inspector-title', textContent: 'Signal' }));
      panel.appendChild(dreamHdr);

      var scroll = el('div', { className: 'inspector-scroll' });
      var dream = el('div', { className: 'inspector-dream' });

      // Sonar echo
      var sonarEcho = el('div', { className: 'sonar-wrap', style: { marginBottom: '16px', padding: '0' } });
      sonarEcho.addEventListener('click', function() { openSignalOverlay(); });
      dream.appendChild(sonarEcho);

      // One-liner from latest journal
      var oneliner = el('div', { className: 'inspector-dream-oneliner' });
      if (state.latestJournal && state.latestJournal.content) {
        oneliner.textContent = extractJournalHeadline(state.latestJournal.content);
      } else {
        oneliner.textContent = 'No dream cycles yet. Click to open Signal.';
        oneliner.style.color = 'var(--t3)';
      }
      oneliner.addEventListener('click', function() { openSignalOverlay(); });
      dream.appendChild(oneliner);

      // Graph health compact
      var healthRow = el('div', { className: 'inspector-dream-health' });
      var compactStats = [
        { v: state.memoryCount, l: 'memories' },
        { v: state.edgeCount, l: 'edges' },
        { v: state.avgStrength.toFixed(2), l: 'avg wt' },
      ];
      for (var hsi = 0; hsi < compactStats.length; hsi++) {
        var hs = el('div', { className: 'inspector-dream-stat' });
        hs.appendChild(el('div', { className: 'inspector-dream-stat-value', textContent: String(compactStats[hsi].v) }));
        hs.appendChild(el('div', { className: 'inspector-dream-stat-label', textContent: compactStats[hsi].l }));
        healthRow.appendChild(hs);
      }
      dream.appendChild(healthRow);

      // Pinned tensions
      if (state.pinnedTensions.length > 0) {
        dream.appendChild(el('div', { className: 'signal-section-label', textContent: 'pinned tensions' }));
        for (var pti = 0; pti < state.pinnedTensions.length; pti++) {
          (function(pt, idx) {
            var ptCard = el('div', { className: 'pinned-tension' });
            ptCard.textContent = '"' + truncate(pt.memoryA, 40) + '" \u2194 "' + truncate(pt.memoryB, 40) + '"';
            var dismissPt = el('button', { className: 'pinned-tension-dismiss', textContent: '\u00d7' });
            dismissPt.addEventListener('click', function(e) {
              e.stopPropagation();
              state.pinnedTensions.splice(idx, 1);
              localStorage.setItem('ff-pinned-tensions', JSON.stringify(state.pinnedTensions));
              renderInspector();
            });
            ptCard.appendChild(dismissPt);
            dream.appendChild(ptCard);
          })(state.pinnedTensions[pti], pti);
        }
      }

      scroll.appendChild(dream);
      panel.appendChild(scroll);
      renderArtifactsZone(panel);
      return;

    // Normal inspector mode — header + tabs + memory detail
    var hdr = el('div', { className: 'inspector-header' });
    hdr.appendChild(el('span', { className: 'inspector-title', textContent: 'Inspector' }));
    var closeBtn = el('span', { className: 'inspector-close', textContent: '\u00d7' });
    closeBtn.addEventListener('click', function() { selectNode(null); });

    panel.appendChild(hdr);

    var tabs = el('div', { className: 'inspector-tabs' });

          className: 'tab' + (state.inspectorTab === t ? ' active' : ''),

      })(tabNames[ti]);

    panel.appendChild(tabs);

    var mem = state.selectedMemory;

        titleEl.textContent = memo.title;
        detail.appendChild(titleEl);

          insightEl.textContent = memo.insight;
          detail.appendChild(insightEl);

        if (memo.patterns.length > 0) {

          for (var pi = 0; pi < memo.patterns.length; pi++) {
            var ptag = el('span', { className: 'mtag pattern' });
            ptag.textContent = memo.patterns[pi];
            patternsDiv.appendChild(ptag);
          }
          detail.appendChild(patternsDiv);
        }

        var rawContent = el('div', { className: 'mem-detail-content' });
        rawContent.style.whiteSpace = 'pre-wrap';
        rawContent.textContent = memo.rawContent;
        detail.appendChild(rawContent);
      } else {
        var content = el('div', { className: 'mem-detail-content' });
        content.style.whiteSpace = 'pre-wrap';
        content.textContent = mem.content || '';
        detail.appendChild(content);
      }

      if (mem.tags && mem.tags.length > 0) {
        var tagsDiv = el('div', { className: 'mem-detail-tags' });
        for (var tg = 0; tg < mem.tags.length; tg++) {
          var tagName = mem.tags[tg];
          var cls = 'mtag' + (tagName === 'principle' ? ' principle' : '') + (mem.memoryType === 'artifact' ? ' artifact' : '');
          var tagEl = el('span', { className: cls });
          tagEl.textContent = tagName;
          tagsDiv.appendChild(tagEl);
        }
        detail.appendChild(tagsDiv);
      }

      var strengthDiv = el('div', { className: 'mem-detail-strength' });
      strengthDiv.appendChild(el('span', { className: 'mem-detail-strength-label', textContent: 'strength' }));

      var sfill = el('div', { className: 'sfill' });
      sfill.style.width = ((mem.strength || 0) * 100) + '%';
      sbar.appendChild(sfill);
      strengthDiv.appendChild(sbar);
      strengthDiv.appendChild(el('span', { className: 'mem-detail-strength-label', textContent: (mem.strength || 0).toFixed(2) }));
      detail.appendChild(strengthDiv);

      var meta = el('div', { className: 'mem-detail-meta' });
      meta.appendChild(el('div', { textContent: 'type: ' + (mem.memoryType || 'semantic') }));
      meta.appendChild(el('div', { textContent: 'id: ' + (mem.id || '').slice(0, 12) }));
      if (mem.createdAt) meta.appendChild(el('div', { textContent: 'created: ' + new Date(mem.createdAt).toLocaleDateString() }));
      if (mem.accessCount !== undefined) meta.appendChild(el('div', { textContent: 'accessed: ' + mem.accessCount + 'x' }));
      detail.appendChild(meta);

      scroll.appendChild(detail);
    } else if (state.inspectorTab === 'edges') {
      if (state.selectedEdges.length === 0) {
        var emptyEdges = el('div', { className: 'inspector-empty' });
        emptyEdges.appendChild(el('div', { textContent: 'No edges' }));
        scroll.appendChild(emptyEdges);
      } else {
        for (var ei = 0; ei < state.selectedEdges.length; ei++) {
          var edge = state.selectedEdges[ei];
          var edgeItem = el('div', { className: 'edge-item' });
          var typeDiv = el('div', { className: 'edge-type' });
          typeDiv.textContent = edge.edgeType || edge.type || 'related';
          edgeItem.appendChild(typeDiv);
          var targetId = edge.sourceId === state.selectedId ? edge.targetId : edge.sourceId;
          var targetNode = state.nodeMap.get(targetId);
          var targetDiv = el('div', { className: 'edge-target' });
          targetDiv.textContent = targetNode ? truncate(targetNode.content, 40) : targetId;
          edgeItem.appendChild(targetDiv);
          (function(tid) {
            edgeItem.addEventListener('click', function() { selectNode(tid); });
          })(targetId);
          scroll.appendChild(edgeItem);
        }
      }
    } else if (state.inspectorTab === 'history') {
      var histLoading = el('div', { className: 'inspector-empty' });
      histLoading.appendChild(el('div', { textContent: 'Loading history...' }));
      scroll.appendChild(histLoading);
      // Fetch supersession chain
      api('/api/memories/' + mem.id + '/history')
        .then(function(data) {
          var chain = Array.isArray(data) ? data : (data.history || data.chain || []);
          clearEl(scroll);
          if (chain.length === 0) {
            var emptyH = el('div', { className: 'inspector-empty' });
            emptyH.appendChild(el('div', { textContent: 'No history chain' }));
            scroll.appendChild(emptyH);
            return;
          }
          for (var hi = 0; hi < chain.length; hi++) {
            var hItem = chain[hi];
            var hDiv = el('div', { className: 'edge-item' });
            var hType = el('div', { className: 'edge-type' });
            hType.textContent = hItem.action || hItem.type || (hi === 0 ? 'current' : 'superseded');
            hDiv.appendChild(hType);
            var hContent = el('div', { className: 'edge-target' });
            hContent.textContent = truncate(hItem.content || hItem.id || '', 60);
            hDiv.appendChild(hContent);
            if (hItem.createdAt) {
              var hDate = el('div', { style: { fontSize: '10px', color: 'var(--t4)', fontFamily: 'var(--font-mono)', marginTop: '2px' } });
              hDate.textContent = new Date(hItem.createdAt).toLocaleString();
              hDiv.appendChild(hDate);
            }
            if (hItem.id && hItem.id !== mem.id) {
              (function(hid) {
                hDiv.addEventListener('click', function() { selectNode(hid); });
              })(hItem.id);
            }
            scroll.appendChild(hDiv);
          }
        })
        .catch(function() {
          clearEl(scroll);
          var errH = el('div', { className: 'inspector-empty' });
          errH.appendChild(el('div', { textContent: 'Could not load history' }));
          scroll.appendChild(errH);
        });
    }

    panel.appendChild(scroll);
    renderArtifactsZone(panel);
  }

  // ===== SEARCH =====
  function buildSearch() {
    var pill = document.getElementById('search-pill');
    clearEl(pill);
    var input = el('input', { type: 'text', placeholder: 'search memories...' });
    input.addEventListener('input', debounce(function() { doSearch(input.value); }, 250));
    pill.appendChild(input);
    pill.appendChild(el('span', { className: 'skey', textContent: '\u2318K' }));
  }

  function doSearch(query) {
    state.searchQuery = query.trim();
    if (!state.searchQuery) {
      state.searchMatches.clear();
      return;
    }
    api('/api/memories/search?q=' + encodeURIComponent(state.searchQuery))
      .then(function(data) {
        state.searchMatches.clear();
        var results = Array.isArray(data) ? data : (data.memories || data.results || []);
        for (var r = 0; r < results.length; r++) {
          state.searchMatches.add(results[r].id);
        }
      })
      .catch(function() {
        // Client-side fallback
        state.searchMatches.clear();
        var q = state.searchQuery.toLowerCase();
        var isTagSearch = q.startsWith('tag:');
        var tagVal = isTagSearch ? q.slice(4) : '';
        for (var n = 0; n < state.nodes.length; n++) {
          var node = state.nodes[n];
          if (isTagSearch) {
            if (node.tags && node.tags.some(function(t) { return t.toLowerCase().indexOf(tagVal) !== -1; })) {
              state.searchMatches.add(node.id);
            }
          } else {
            if ((node.content || '').toLowerCase().indexOf(q) !== -1) {
              state.searchMatches.add(node.id);
            }
          }
        }
      });
  }

  // ===== SONAR WAVEFORM =====
  function drawSonar(canvas, guardianTemp, guardianState, pressure, time) {
    var ctx = canvas.getContext('2d');
    if (!ctx) return;
    var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reducedMotion) time = 0;
    var w = canvas.width;
    var h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Dimension 1: Color from Guardian state (sage -> gold -> terra)
    var r, g, b;
    if (guardianTemp < 0.3) {
      var t = guardianTemp / 0.3;
      r = Math.round(138 + t * (184 - 138));
      g = Math.round(171 + t * (150 - 171));
      b = Math.round(127 + t * (90 - 127));
    } else if (guardianTemp < 0.6) {
      var t2 = (guardianTemp - 0.3) / 0.3;
      r = Math.round(184 + t2 * (196 - 184));
      g = Math.round(150 + t2 * (149 - 150));
      b = Math.round(90 + t2 * (106 - 90));
    } else {
      r = 196; g = 149; b = 106;
    }

    // Dimension 2: Amplitude from sleep pressure (0-100 mapped to 35%-90% of height)
    // Minimum 35% ensures the wave is always visible even at zero pressure
    var normalizedPressure = Math.min(1, Math.max(0, pressure / 80));
    var amplitude = (0.35 + normalizedPressure * 0.55) * (h / 2);

    // Dimension 3: Frequency from urgency (calm=slow, warm=medium, trapped=fast)
    var freq;
    if (guardianTemp < 0.3) freq = 0.5 + guardianTemp * 3;
    else if (guardianTemp < 0.6) freq = 1.5 + (guardianTemp - 0.3) * 5;
    else freq = 3 + (guardianTemp - 0.6) * 5;

    var lineWidth = w > 400 ? 2.5 : 2;
    ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',0.9)';
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.save();
    ctx.shadowColor = 'rgba(' + r + ',' + g + ',' + b + ',0.5)';
    ctx.shadowBlur = 12;

    ctx.beginPath();
    var midY = h / 2;
    var phase = time * freq * 0.003;

    for (var x = 0; x < w; x++) {
      var t3 = x / w;
      var envelope = Math.sin(t3 * Math.PI);
      var y = midY + amplitude * envelope * (
        Math.sin(phase + t3 * Math.PI * 4) * 0.7 +
        Math.sin(phase * 1.3 + t3 * Math.PI * 7) * 0.2 +
        Math.sin(phase * 0.7 + t3 * Math.PI * 2) * 0.1
      );
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // ===== SSE =====
  function connectSSE() {
    if (state.eventSource) {
      state.eventSource.close();
    }
    var url = API_BASE + '/api/events';
    var es = new EventSource(url);
    state.eventSource = es;

    es.onopen = function() {
      state.connected = true;
      hideBanner();
      renderSidebar();
      renderStatusbar();
    };

    es.onerror = function() {
      state.connected = false;
      showBanner('Connection lost. Reconnecting...');
      renderSidebar();
      renderStatusbar();
      es.close();
      state.eventSource = null;
      clearTimeout(state.reconnectTimer);
      state.reconnectTimer = setTimeout(connectSSE, 3000);
    };

    es.addEventListener('memory:created', function(e) {
      try {
        var mem = JSON.parse(e.data);
        addNodeFromMemory(mem);
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('memory:updated', function(e) {
      try {
        var mem = JSON.parse(e.data);
        var existing = state.nodeMap.get(mem.id);
        if (existing) Object.assign(existing, mem);
        if (state.selectedId === mem.id) {
          state.selectedMemory = existing;
          renderInspector();
        }
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('memory:deleted', function(e) {
      try {
        var data = JSON.parse(e.data);
        removeNode(data.id || data);
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('edge:created', function(e) {
      try {
        var edge = JSON.parse(e.data);
        state.edges.push(edge);
        state.edgeCount = state.edges.length;
        renderStatusbar();
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('edge:deleted', function(e) {
      try {
        var data = JSON.parse(e.data);
        var id = data.id || data;
        state.edges = state.edges.filter(function(edge) { return edge.id !== id; });
        state.edgeCount = state.edges.length;
        renderStatusbar();
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('memory:promoted', function(e) {
      try {
        var mem = JSON.parse(e.data);
        var existing = state.nodeMap.get(mem.id);
        if (existing) {
          existing.memoryType = 'artifact';
          Object.assign(existing, mem);
        }
        loadArtifacts();
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('guardian:update', function(e) {
      try {
        var data = JSON.parse(e.data);
        if (data.value !== undefined) state.guardianTemp = data.value;
        if (data.state) state.guardianState = data.state;
        if (data.signals) state.guardianSignals = data.signals;
        renderSidebar();
        renderStatusbar();
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('dream:journal:written', function(e) {
      try {
        loadLatestJournal().then(function() { renderInspector(); });
        loadSleepPressure();
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('dream:nrem:complete', function(e) {
      try {
        loadSleepPressure();
        loadLatestJournal().then(function() { renderInspector(); });
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('dream:rem:complete', function(e) {
      try {
        loadSleepPressure();
        loadLatestJournal().then(function() { renderInspector(); });
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('dream:seed:graded', function(e) {
      try {
        if (state.signalOverlayOpen) loadSignalData();
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('guardian:sleep_pressure', function(e) {
      try {
        var data = JSON.parse(e.data);
        if (data.score !== undefined) state.sleepPressure = data.score;
        if (data.components) state.sleepPressureComponents = data.components;
      } catch(err) { /* ignore */ }
    });

    es.addEventListener('valence:classified', function(e) {
      try {
        var data = JSON.parse(e.data);
        var existing = state.nodeMap.get(data.memoryId);
        if (existing) existing.valence = data.valence;
      } catch(err) { /* ignore */ }
    });

    es.onmessage = function() {};
  }

  function addNodeFromMemory(mem) {
    if (state.nodeMap.has(mem.id)) return;
    var w = graphCanvas.width / devicePixelRatio;
    var h = graphCanvas.height / devicePixelRatio;
    mem.x = (Math.random() - 0.5) * w * 0.4;
    mem.y = (Math.random() - 0.5) * h * 0.4;
    mem.vx = 0;
    mem.vy = 0;
    mem.depth = 0.6 + Math.random() * 0.8;
    mem.driftAngle = Math.random() * Math.PI * 2;
    mem.driftSpeed = 0.02 + Math.random() * 0.04;
    state.nodes.push(mem);
    state.nodeMap.set(mem.id, mem);
    state.memoryCount = state.nodes.length;
    renderSidebar();
    renderStatusbar();
  }

  function removeNode(id) {
    state.nodes = state.nodes.filter(function(n) { return n.id !== id; });
    state.nodeMap.delete(id);
    state.edges = state.edges.filter(function(e) { return e.sourceId !== id && e.targetId !== id; });
    if (state.selectedId === id) selectNode(null);
    state.memoryCount = state.nodes.length;
    state.edgeCount = state.edges.length;
    renderSidebar();
    renderStatusbar();
  }

  function loadGraph() {
    return api('/api/graph/clustered').then(function(data) {
      state.nodes = data.nodes || [];
      state.edges = data.edges || [];
      state.nodeMap.clear();
      for (var i = 0; i < state.nodes.length; i++) {
        state.nodeMap.set(state.nodes[i].id, state.nodes[i]);
      }
      state.memoryCount = data.nodes ? data.nodes.length : 0;
      state.edgeCount = data.edges ? data.edges.length : 0;

      if (state.nodes.length > 0) {
        var sum = 0;
        for (var j = 0; j < state.nodes.length; j++) sum += (state.nodes[j].strength || 0);
        state.avgStrength = sum / state.nodes.length;
      }

      initCytoscape(data);
      renderSidebar();
      renderStatusbar();
    }).catch(function(err) {
      console.error('Failed to load graph:', err);
      showBanner('Could not reach server. Check that ForgeFrame is running.');
    });
  }

  // ===== CYTOSCAPE GRAPH =====
  var cy = null;

  var TRIM_TAG_COLORS = {
    principle: '#8aab7f', voice: '#8aab7f',
    decision: '#b8965a', pattern: '#b8965a',
    observation: '#8b7355', entity: '#8b7355',
    thread: '#c4956a', skill: '#c4956a',
    milestone: '#8b7355', evaluation: '#b8965a',
  };

  function getTrimTagColor(tags) {
    for (var i = 0; i < tags.length; i++) {
      if (TRIM_TAG_COLORS[tags[i]]) return TRIM_TAG_COLORS[tags[i]];
    }
    return '#8b7355';
  }

  function cyNodeRadius(visualWeight) {
    return Math.max(6, Math.min(24, 6 + visualWeight * 1.5));
  }

  function buildCytoscapeStylesheet() {
    var isDark = state.theme === 'ink' || state.theme === 'void';
    var edgeColor = isDark ? 'rgba(232,230,225,0.08)' : 'rgba(139,115,85,0.12)';
    var labelBg = isDark ? 'rgba(30,30,35,0.85)' : 'rgba(240,238,230,0.85)';
    var labelColor = isDark ? 'rgba(232,230,225,0.7)' : 'rgba(28,25,23,0.6)';
    var clusterLabelColor = isDark ? 'rgba(232,230,225,0.35)' : 'rgba(28,25,23,0.35)';

    return [
      { selector: 'node[^parent]', style: {
        'background-color': function(ele) { return getTrimTagColor(ele.data('tags') || []); },
        'background-opacity': function(ele) { return Math.max(0.25, ele.data('strength') || 0.5); },
        'width': function(ele) { return cyNodeRadius(ele.data('visualWeight') || 0) * 2; },
        'height': function(ele) { return cyNodeRadius(ele.data('visualWeight') || 0) * 2; },
        'label': '',
        'border-width': function(ele) {
          var v = ele.data('valence');
          return (v === 'charged' || v === 'grounding') ? 2 : 0;
        },
        'border-color': function(ele) {
          var v = ele.data('valence');
          if (v === 'charged') return '#b8965a';
          if (v === 'grounding') return '#8aab7f';
          return 'transparent';
        },
        'shape': function(ele) {
          return ele.data('memoryType') === 'artifact' ? 'diamond' : 'ellipse';
        },
      }},
      { selector: 'node:selected', style: {
        'border-width': 3,
        'border-color': '#b8965a',
        'overlay-opacity': 0.08,
        'overlay-color': '#b8965a',
      }},
      { selector: ':parent', style: {
        'background-opacity': function(ele) { return Math.max(0.03, (ele.data('avgStrength') || 0.5) * 0.08); },
        'background-color': function(ele) {
          var trimTag = ele.data('dominantTrimTag') || 'observation';
          return TRIM_TAG_COLORS[trimTag] || '#8b7355';
        },
        'border-width': 1,
        'border-style': 'dashed',
        'border-color': function(ele) {
          var trimTag = ele.data('dominantTrimTag') || 'observation';
          return TRIM_TAG_COLORS[trimTag] || '#8b7355';
        },
        'border-opacity': 0.25,
        'label': function(ele) { return (ele.data('label') || '').toUpperCase(); },
        'font-family': "'JetBrains Mono', monospace",
        'font-size': 9,
        'font-weight': 500,
        'color': clusterLabelColor,
        'text-valign': 'bottom',
        'text-margin-y': 8,
        'padding': 20,
        'shape': 'round-rectangle',
        'corner-radius': 12,
      }},
      { selector: 'edge', style: {
        'width': function(ele) {
          var rt = ele.data('relationType');
          return (rt === 'led-to' || rt === 'contradicts' || rt === 'supersedes') ? 1.5 : 0.8;
        },
        'line-color': edgeColor,
        'line-opacity': function(ele) { return Math.max(0.04, Math.min(0.25, (ele.data('weight') || 0.5) * 0.25)); },
        'curve-style': 'bezier',
        'target-arrow-shape': 'none',
      }},
    ];
  }

  function initCytoscape(graphData) {
    var container = document.getElementById('cy-container');
    if (!container) return;

    var elements = [];

    // Cluster parent nodes
    for (var ci = 0; ci < graphData.clusters.length; ci++) {
      var cluster = graphData.clusters[ci];
      elements.push({
        group: 'nodes',
        data: {
          id: cluster.id,
          label: cluster.label,
          memberCount: cluster.memberCount,
          avgStrength: cluster.avgStrength,
          dominantTrimTag: cluster.dominantTrimTag,
        },
      });
    }

    // Memory nodes
    for (var ni = 0; ni < graphData.nodes.length; ni++) {
      var node = graphData.nodes[ni];
      elements.push({
        group: 'nodes',
        data: {
          id: node.id,
          parent: node.parent || undefined,
          content: node.content,
          tags: node.tags,
          strength: node.strength,
          valence: node.valence,
          memoryType: node.memoryType,
          visualWeight: node.visualWeight,
          createdAt: node.createdAt,
        },
      });
    }

    // Edges
    for (var ei = 0; ei < graphData.edges.length; ei++) {
      var edge = graphData.edges[ei];
      elements.push({
        group: 'edges',
        data: {
          id: edge.id,
          source: edge.source,
          target: edge.target,
          relationType: edge.relationType,
          weight: edge.weight,
        },
      });
    }

    if (cy) cy.destroy();

    cy = cytoscape({
      container: container,
      elements: elements,
      style: buildCytoscapeStylesheet(),
      layout: {
        name: 'fcose',
        animate: true,
        animationDuration: 1000,
        animationEasing: 'ease-out-cubic',
        quality: 'default',
        randomize: true,
        nodeDimensionsIncludeLabels: true,
        packComponents: true,
        nodeRepulsion: function() { return 8000; },
        idealEdgeLength: function() { return 80; },
        edgeElasticity: function() { return 0.1; },
        nestingFactor: 0.15,
        gravity: 0.25,
        gravityRange: 1.5,
        numIter: 2500,
      },
      minZoom: 0.1,
      maxZoom: 5,
      wheelSensitivity: 0.3,
    });

    // Node click -> select in inspector
    cy.on('tap', 'node', function(evt) {
      var node = evt.target;
      if (node.isParent()) return;
      selectNode(node.id());
    });

    // Background click -> deselect
    cy.on('tap', function(evt) {
      if (evt.target === cy) selectNode(null);
    });

    // Hover: show label
    cy.on('mouseover', 'node', function(evt) {
      var node = evt.target;
      if (node.isParent()) return;
      var content = node.data('content') || '';
      var line = content.split('\n')[0] || '';
      if (line.length > 60) line = line.slice(0, 57) + '...';
      var isDark = state.theme === 'ink' || state.theme === 'void';
      node.style({
        'label': line,
        'font-size': 10,
        'font-family': "'Inter', sans-serif",
        'font-weight': 300,
        'color': isDark ? 'rgba(232,230,225,0.85)' : 'rgba(28,25,23,0.85)',
        'text-background-opacity': 0.8,
        'text-background-color': isDark ? 'rgba(30,30,35,0.9)' : 'rgba(240,238,230,0.9)',
        'text-background-padding': '4px',
        'text-background-shape': 'roundrectangle',
      });
    });

    cy.on('mouseout', 'node', function(evt) {
      if (!evt.target.isParent()) evt.target.style('label', '');
    });
  }

  function updateCytoscapeTheme() {
    if (!cy) return;
    cy.style().fromJson(buildCytoscapeStylesheet()).update();
  }

  // ===== SIGNAL OVERLAY =====
  function openSignalOverlay() {
    state.signalOverlayOpen = true;
    document.getElementById('signal-dimmer').classList.add('open');
    document.getElementById('signal-overlay').classList.add('open');
    loadSignalData();
